version: '3'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:6.1.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:6.1.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - 8100:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  ingestion:
    build:
      context: ./ingestion_layer
    container_name: ingestion
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:29092
      OPENSKY_URL: https://opensky-network.org/api/states/all
      POLL_INTERVAL_SECONDS: 10
    restart: unless-stopped


  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: opensky
      POSTGRES_USER: opensky
      POSTGRES_PASSWORD: opensky
    volumes:
      - postgres_data:/var/lib/postgresql/data

  sink:
    build:
      context: ./processing_layer
    container_name: sink
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: flights_processed
      KAFKA_GROUP: flights-db-sink
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: opensky
      DB_USER: opensky
      DB_PASSWORD: opensky
    restart: unless-stopped

  backend:
    build:
      context: ./backend_layer
    container_name: backend
    depends_on:
      - postgres
    ports:
      - 8000:8080
    environment:
      DATABASE_URL: postgresql://opensky:opensky@postgres:5432/opensky?sslmode=disable
      HTTP_ADDR: 0.0.0.0:8080
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    depends_on:
      - backend
    ports:
      - 3000:80
    restart: unless-stopped

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    entrypoint:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
    ports:
      - 7077:7077
      - 8080:8080
    expose:
      - 7077
      - 8080
    environment:
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_MASTER_PORT: 7077
    volumes:
      - ./processing_layer:/opt/spark-apps

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    depends_on:
      - spark-master
    entrypoint:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    ports:
      - 8081:8081
    expose:
      - 8081
    environment:
      SPARK_WORKER_WEBUI_PORT: 8081
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2G
    volumes:
      - ./processing_layer:/opt/spark-apps

  spark-job:
    image: apache/spark:3.5.0
    container_name: spark-job
    depends_on:
      - spark-master
      - spark-worker
      - kafka
    volumes:
      - ./processing_layer:/opt/spark-apps
    environment:
      SPARK_MASTER: spark://spark-master:7077
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INPUT_TOPIC: flights_raw
      OUTPUT_TOPIC: flights_processed
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --deploy-mode
      - client
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0
      - --conf
      - spark.jars.ivy=/tmp/.ivy2
      - /opt/spark-apps/process_flights.py

  # ── Monitoring ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - 9090:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - 3200:3000
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    restart: unless-stopped

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    ports:
      - 9308:9308
    command:
      - '--kafka.server=kafka:29092'
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    ports:
      - 9187:9187
    environment:
      DATA_SOURCE_NAME: "postgresql://opensky:opensky@postgres:5432/opensky?sslmode=disable"
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: opensky_analytics_network